<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Дневник настроения ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 45px;
            padding: 30px 25px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
            border-bottom: 2px solid #e0e0e0;
            display: inline-block;
            padding-bottom: 8px;
        }

        .mood-buttons {
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .mood-btn {
            background: white;
            border: none;
            font-size: 52px;
            padding: 18px;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            min-width: 85px;
        }

        .mood-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .mood-btn:active {
            transform: translateY(2px) scale(0.95);
        }

        .mood-btn[data-mood="happy"]:hover { background: #FFF9C4; }
        .mood-btn[data-mood="normal"]:hover { background: #E0F2FE; }
        .mood-btn[data-mood="sad"]:hover { background: #E1F5FE; }
        .mood-btn[data-mood="love"]:hover { background: #FFE4E1; }
        .mood-btn[data-mood="angry"]:hover { background: #FFEBEE; }

        #status {
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f2f5 100%);
            padding: 15px 20px;
            border-radius: 35px;
            margin: 20px 0;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .history-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .history-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .history-btn:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        @keyframes successPulse {
            0% { transform: scale(1); background: #e8f5e9; }
            50% { transform: scale(1.02); background: #c8e6c9; }
            100% { transform: scale(1); background: #e8f5e9; }
        }

        .success-animation {
            animation: successPulse 0.5s ease-out;
        }

        .mood-btn, .history-btn {
            position: relative;
            overflow: hidden;
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="debug" style="background:yellow; padding:5px; font-size:10px; display:none;"></div>
    <div class="container">
        <h1>
            <span>🌸</span>
            Дневник настроения
            <span>🌷</span>
        </h1>
        <div class="subtitle">Как ты себя чувствуешь?</div>
        
        <div class="mood-buttons">
            <button class="mood-btn" data-mood="happy" title="Счастлива">😊</button>
            <button class="mood-btn" data-mood="normal" title="Нормально">😐</button>
            <button class="mood-btn" data-mood="sad" title="Грустно">😔</button>
            <button class="mood-btn" data-mood="love" title="Влюблена">🥰</button>
            <button class="mood-btn" data-mood="angry" title="Злюсь">😠</button>
        </div>
        
        <button class="history-btn" id="historyBtn">
            📅 Посмотреть историю
        </button>
        
        <div id="status">
            ✨ Нажми на смайлик, чтобы поделиться настроением ✨
        </div>
        <div class="footer">
            ❤️ Твоё настроение сохраняется и будет видно в истории ❤️
        </div>
    </div>

    <script>
        // Получаем данные о пользователе из Telegram WebApp
        let tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();
            console.log('Telegram WebApp инициализирован');
        } else {
            console.warn('Telegram WebApp не обнаружен');
        }
        
        // Функция отправки настроения через sendData
        function sendMood(mood) {
            const statusDiv = document.getElementById('status');
            const moodEmojis = {
                'happy': '😊',
                'normal': '😐',
                'sad': '😔',
                'love': '🥰',
                'angry': '😠'
            };
            
            statusDiv.innerHTML = `📤 Отправляю ${moodEmojis[mood]}...`;
            statusDiv.style.background = '#E3F2FD';
            
            if (window.Telegram && window.Telegram.WebApp) {
                const data = JSON.stringify({
                    mood: mood,
                    mood_emoji: moodEmojis[mood],
                    timestamp: new Date().toISOString()
                });
                
                window.Telegram.WebApp.sendData(data);
                
                statusDiv.innerHTML = `✅ ${moodEmojis[mood]} Отправлено! Спасибо ❤️`;
                statusDiv.style.background = '#E8F5E9';
                statusDiv.classList.add('success-animation');
                
                setTimeout(() => {
                    window.Telegram.WebApp.close();
                }, 1000);
            } else {
                statusDiv.innerHTML = '❌ Ошибка: не удалось подключиться к Telegram';
                statusDiv.style.background = '#FFEBEE';
            }
        }
        
        // Навешиваем обработчики на кнопки настроения
        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mood = btn.getAttribute('data-mood');
                sendMood(mood);
            });
        });
        
        // Кнопка истории
        document.getElementById('historyBtn').addEventListener('click', () => {
            if (tg) {
                // Отправляем команду боту через WebApp
                tg.sendData(JSON.stringify({ action: 'history' }));
                tg.close();
            } else {
                // Запасной вариант
                window.location.href = `https://t.me/MyLoveMood_bot?command=history`;
            }
        });
        
        // Эффект пульсации
        document.querySelectorAll('.mood-btn, .history-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
        
            console.log('🌸 Дневник настроения загружен!');
            // Диагностика
    const debugDiv = document.getElementById('debug');
    function logDebug(msg) {
        console.log(msg);
        if (debugDiv) {
            debugDiv.style.display = 'block';
            debugDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
        }
    }

    logDebug('Страница загружена');
    logDebug('window.Telegram = ' + (window.Telegram ? 'есть' : 'нет'));
    logDebug('window.Telegram?.WebApp = ' + (window.Telegram?.WebApp ? 'есть' : 'нет'));

    if (!window.Telegram?.WebApp) {
        logDebug('⚠️ ОШИБКА: Telegram WebApp не обнаружен!');
        logDebug('Убедись, что открываешь приложение через кнопку бота в Telegram');
    }
    </script>
</body>
</html>
